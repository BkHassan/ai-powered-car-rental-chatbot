services:
  rasa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automaroc-rasa
    ports:
      - "5005:5005"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - RASA_TELEMETRY_ENABLED=false
    depends_on:
      redis:
        condition: service_healthy
      action-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - chatbot-net
    restart: unless-stopped

  action-server:
    build:
      context: .
      dockerfile: Dockerfile.actions
    container_name: automaroc-actions
    ports:
      - "5055:5055"
    volumes:
      - ./actions:/app/actions
    environment:
      - RASA_TELEMETRY_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
    image: redis:7-alpine
    container_name: automaroc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-net
    restart: unless-stopped

  # Optional: nginx reverse proxy for TLS termination and rate limiting
  nginx:
    image: nginx:1.25-alpine
    container_name: automaroc-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rasa
    networks:
      - chatbot-net
    profiles:
      - with-proxy
    restart: unless-stopped

networks:
  chatbot-net:
    driver: bridge

volumes:
  redis-data:
