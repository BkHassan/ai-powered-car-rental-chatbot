version: "3.1"

intents:
  - saluer
  - prendre_conge
  - demander_categories
  - demander_conditions
  - demander_pieces
  - demander_prix
  - demander_disponibilite
  - demander_aide
  - reserver_voiture
  - fournir_infos
  - annuler_reservation
  - confirmer
  - nier
  - bot_challenge

entities:
  - categorie_voiture
  - date_debut
  - date_fin

slots:
  categorie_voiture:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: categorie_voiture
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: categorie_voiture
  date_debut:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: date_debut
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: date_debut
  date_fin:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: date_fin
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: date_fin
  reservation_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  reservation_status:
    type: categorical
    values:
      - pending
      - confirmed
      - cancelled
    influence_conversation: true
    mappings:
      - type: custom
  prix_estime:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  disponibilite:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  fallback_count:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

forms:
  reservation_form:
    required_slots:
      - categorie_voiture
      - date_debut
      - date_fin
    ignored_intents:
      - saluer
      - prendre_conge
      - demander_aide
      - bot_challenge

responses:
  utter_saluer:
    - text: |
        👋 Bonjour et bienvenue chez **AutoMaroc Location**.

        Je suis votre assistant virtuel et je peux vous accompagner tout au long de votre réservation.

        Je peux notamment :

        🚗 Vous présenter nos véhicules

        💰 Estimer le prix d'une location

        📅 Réserver une voiture

        📄 Expliquer les conditions de location

        Que souhaitez-vous faire ?

      buttons:
        - title: "🚗 Voir les véhicules"
          payload: "/demander_categories"

        - title: "💰 Consulter les tarifs"
          payload: "/demander_prix"

        - title: "📅 Réserver"
          payload: "/reserver_voiture"

        - title: "📄 Conditions"
          payload: "/demander_conditions"

  utter_prendre_conge:
    - text: "Merci de votre confiance ! Bon voyage et à très bientôt chez AutoMaroc Location."

  utter_categories:
    - text: |
        🚗 Économique

        Dacia Logan

        200 DH / jour
      image: "/images/dacia_logan.jpg"

      buttons:
        - title: "Réserver"
          payload: "/reserver_voiture"

    - text: |
        🚙 Citadine

        Hyundai i10

        250 DH / jour
      image: "/images/citadine.jpg"

      buttons:
        - title: "Réserver"
          payload: "/reserver_voiture"

    - text: |
        🚘 SUV

        Toyota RAV4

        450 DH / jour
      image: "/images/suv.jpg"

      buttons:
        - title: "Réserver"
          payload: "/reserver_voiture"

  utter_conditions:
    - text: "Conditions de location :\n• Âge minimum : **21 ans**\n• Permis valide depuis **2 ans** minimum\n• Caution selon catégorie (carte bancaire obligatoire)\n• Kilométrage : 200 km/jour inclus, puis 2 DH/km supplémentaire"

  utter_pieces_requises:
    - text: "Documents requis à la prise en charge :\n• **CIN** (résidents marocains) ou **passeport** (MRE / touristes)\n• Permis de conduire **original** (pas de photocopie)\n• Carte bancaire au nom du conducteur principal"

  utter_prix_info:
    - text: |
        💰 Tarifs indicatifs

        🚗 Économique : 200 DH/jour

        🚙 Citadine : 250 DH/jour

        🚘 SUV / Familiale : 450 DH/jour

        Pour obtenir un prix exact, indiquez vos dates de location.

  utter_demander_infos:
    - text: |
        Parfait 😊

        Je vais recueillir les informations nécessaires pour préparer votre réservation.

        Vous pouvez répondre étape par étape ou bien me donner directement :

        • la catégorie

        • la date de début

        • la date de fin

  utter_ask_categorie_voiture:
    - text: |
        😊 Très bien !

        Quel type de véhicule recherchez-vous ?

      buttons:
        - title: "🚗 Économique"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'

        - title: "🚙 Citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'

        - title: "🚘 SUV"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'

  utter_ask_date_debut:
    - text: |
        Très bien 👍

        À quelle date souhaitez-vous récupérer le véhicule ?

        Exemple :

        • 15 juillet

        • 15/07/2026

        • demain

  utter_ask_date_fin:
    - text: "Jusqu'à quelle date aurez-vous besoin du véhicule ? (ex. 22 juillet ou 22/07/2026)"

  utter_slot_categorie_invalide:
    - text: "Je n'ai pas reconnu cette catégorie. Choisissez parmi : **Économique**, **Citadine** ou **SUV / Familiale**."

  utter_slot_date_invalide:
    - text: "Je n'ai pas compris cette date. Utilisez par exemple « 15 juillet » ou « 15/07/2026 »."

  utter_slot_date_passee:
    - text: "La date de début doit être aujourd'hui ou dans le futur. Pouvez-vous indiquer une autre date ?"

  utter_slot_date_fin_invalide:
    - text: "La date de fin doit être **après** la date de début. Pouvez-vous corriger ?"

  utter_demander_categorie_pour_prix:
    - text: "Pour estimer le prix, indiquez d'abord une catégorie (Économique, Citadine ou SUV)."

  utter_demander_categorie_pour_dispo:
    - text: "Pour vérifier la disponibilité, précisez la catégorie souhaitée (et vos dates si possible)."

  utter_estimation_prix_base:
    - text: "Tarif indicatif pour une **{categorie_voiture}** : environ **{tarif_journalier} DH/jour** (hors saison haute). Donnez vos dates pour un total exact."

  utter_estimation_prix_detail:
    - text: |
        💰 Voici l'estimation de votre location.

        🚗 Catégorie : {categorie_voiture}

        📅 Du {date_debut}

        📅 Au {date_fin}

        ⏳ Durée : {jours} jour(s)

        💵 Tarif journalier : {tarif_journalier} DH

        ✅ Total estimé : **{total} DH**

        (Assurance de base incluse.)

  utter_disponibilite_ok:
    - text: |
        Excellente nouvelle ✅

        Nous avons actuellement **{available} véhicule(s)** disponibles dans la catégorie **{category}**.

        Les dates demandées ({date_debut} → {date_fin}) sont donc disponibles.

        Je peux maintenant préparer votre réservation.

  utter_disponibilite_limitee:
    - text: "Stock limité : seulement **{available}** **{category}** disponible(s) du {date_debut} au {date_fin}. Je vous conseille de réserver rapidement."

  utter_disponibilite_indisponible:
    - text: "Désolé, aucun **{category}** n'est disponible du {date_debut} au {date_fin}. Essayez d'autres dates ou une autre catégorie."

  utter_resume_incomplet:
    - text: "Il me manque des informations pour le récapitulatif. C omplétons d'abord catégorie et dates."

  utter_resume_reservation:
    - text: |
        📋 Récapitulatif

        🚗 Catégorie : {categorie_voiture}

        📅 Début : {date_debut}

        📅 Fin : {date_fin}

        💰 Prix estimé : **{prix_estime} DH**

        Souhaitez-vous confirmer cette réservation ?

  utter_reservation_confirmee:
    - text: |
        ✅ Réservation confirmée !

        📄 Référence : {reservation_id}

        🚗 Véhicule : {categorie_voiture}

        📅 Du {date_debut}

        📅 Au {date_fin}

        Merci d'avoir choisi AutoMaroc.

        Nous vous souhaitons un excellent voyage 🚗

  utter_confirmation_recue:
    - text: "C'est bien noté. Votre demande pour une **{categorie_voiture}** du {date_debut} au {date_fin} est enregistrée."

  utter_annulation_politique:
    - text: "Politique d'annulation :\n• **Gratuite** jusqu'à 48 h avant la prise en charge\n• Acompte transformé en avoir en cas d'annulation tardive\n• Aucun remboursement en cash sur place\n\nSouhaitez-vous annuler une réservation existante ?"

  utter_annulation_confirmee:
    - text: "Votre réservation **{reservation_id}** a bien été annulée. L'acompte sera converti en avoir utilisable sur votre prochaine location."

  utter_annulation_sans_reservation:
    - text: "Je ne trouve pas de réservation active dans cette conversation. Si vous avez un numéro de référence, contactez notre agence au +212 5XX-XXXXXX."

  utter_aide_defaut:
    - text: |
        Je peux vous aider à :

        🚗 Consulter les véhicules

        💰 Obtenir une estimation de prix

        📅 Réserver une voiture

        📄 Consulter les conditions

        ❌ Annuler une réservation

        Dites-moi simplement ce que vous souhaitez faire.

  utter_fallback_rephrase:
    - text: |
        Je ne suis pas certain d'avoir bien compris.

        Pouvez-vous reformuler votre demande ?

        Par exemple :

        • Je veux louer une citadine

        • Quels sont vos tarifs ?

        • Je souhaite réserver un SUV du 10 au 15 juillet

  utter_demander_aide:
    - text: |
        😊 Je peux vous accompagner pour :

        🚗 Découvrir nos véhicules

        💰 Consulter les tarifs

        📅 Réserver une voiture

        📄 Conditions de location

        ❌ Annuler une réservation

        Que souhaitez-vous faire ?

      buttons:
        - title: "🚗 Véhicules"
          payload: "/demander_categories"

        - title: "📅 Réserver"
          payload: "/reserver_voiture"

        - title: "💰 Tarifs"
          payload: "/demander_prix"

        - title: "📄 Conditions"
          payload: "/demander_conditions"

  utter_iamabot:
    - text: "Je suis l'assistant virtuel d'AutoMaroc Location, propulsé par Rasa. Je peux vous guider pour la location de véhicules au Maroc."

  utter_reservation_annulee_par_utilisateur:
    - text: "Pas de souci, j'annule la procédure en cours. Dites-moi si vous souhaitez recommencer ou poser une autre question."

  utter_reformuler_reservation:
    - text: "D'accord. Indiquez les nouvelles informations (catégorie et/ou dates) et je mets à jour votre demande."

actions:
  - validate_reservation_form
  - action_check_availability
  - action_estimate_rental_price
  - action_reservation_summary
  - action_confirm_reservation
  - action_confirm_cancellation
  - action_reset_reservation_form
  - action_default_fallback

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true