version: "3.1"

intents:
  - saluer
  - prendre_conge
  - demander_categories
  - demander_conditions
  - demander_pieces
  - demander_prix
  - demander_disponibilite
  - demander_aide
  - reserver_voiture
  - fournir_infos
  - annuler_reservation
  - confirmer
  - nier
  - bot_challenge

entities:
  - categorie_voiture
  - date_debut
  - date_fin

slots:
  categorie_voiture:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: categorie_voiture
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: categorie_voiture
  date_debut:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: date_debut
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: date_debut
  date_fin:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: date_fin
      - type: from_text
        conditions:
          - active_loop: reservation_form
            requested_slot: date_fin
  reservation_id:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  reservation_status:
    type: categorical
    values:
      - pending
      - confirmed
      - cancelled
    influence_conversation: true
    mappings:
      - type: custom
  prix_estime:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  disponibilite:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
  fallback_count:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

forms:
  reservation_form:
    required_slots:
      - categorie_voiture
      - date_debut
      - date_fin
    ignored_intents:
      - saluer
      - prendre_conge
      - demander_aide
      - bot_challenge

responses:
  utter_saluer:
    - text: "👋 Bonjour et bienvenue chez **AutoMaroc Location** !"
    - text: "Je suis là pour vous aider à **choisir un véhicule**, **estimer un tarif** ou **finaliser une réservation**."
    - text: "Alors, par où souhaitez-vous commencer ?"
      buttons:
        - title: "🚗 Voir les véhicules"
          payload: "/demander_categories"
        - title: "💰 Consulter les tarifs"
          payload: "/demander_prix"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"
        - title: "📄 Conditions"
          payload: "/demander_conditions"

  utter_prendre_conge:
    - text: "Merci pour votre confiance ! **Bon voyage** et à très bientôt chez AutoMaroc Location. 🚗"

  utter_categories:
    - text: |
        **Économique** — Dacia Logan
        **200 DH / jour**
      image: "/images/dacia_logan.jpg"
      buttons:
        - title: "Réserver cette catégorie"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'
    - text: |
        **Citadine** — Hyundai i10
        **250 DH / jour**
      image: "/images/citadine.jpg"
      buttons:
        - title: "Réserver cette catégorie"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
    - text: |
        **SUV / Familiale** — Toyota RAV4
        **450 DH / jour**
      image: "/images/suv.jpg"
      buttons:
        - title: "Réserver cette catégorie"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'
    - text: "Une catégorie vous intéresse ? Appuyez sur **Réserver**, ou demandez-moi une **estimation de prix**."
      buttons:
        - title: "💰 Estimer un prix"
          payload: "/demander_prix"
        - title: "📅 Démarrer une réservation"
          payload: "/reserver_voiture"

  utter_conditions:
    - text: "Voici les **conditions essentielles** pour louer chez AutoMaroc :"
    - text: |
        • Âge minimum : **21 ans**
        • Permis valide depuis **2 ans**
        • **Caution** par carte bancaire (selon catégorie)
        • **200 km/jour** inclus, puis **2 DH/km**
      buttons:
        - title: "📄 Documents requis"
          payload: "/demander_pieces"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"

  utter_pieces_requises:
    - text: "À la prise en charge, munissez-vous de ces **3 documents** :"
    - text: |
        • **CIN** (résidents) ou **passeport** (MRE / touristes)
        • Permis de conduire **original**
        • Carte bancaire au nom du **conducteur principal**
      buttons:
        - title: "📄 Voir les conditions"
          payload: "/demander_conditions"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"

  utter_prix_info:
    - text: "Nos **tarifs indicatifs** par jour :"
    - text: |
        🚗 **Économique** : 200 DH
        🚙 **Citadine** : 250 DH
        🚘 **SUV / Familiale** : 450 DH
    - text: "Pour un **prix exact**, indiquez votre catégorie et vos dates."
      buttons:
        - title: "💰 Obtenir une estimation"
          payload: "/demander_prix"
        - title: "📅 Réserver directement"
          payload: "/reserver_voiture"

  utter_demander_infos:
    - text: "Parfait 😊 Je vais recueillir **3 infos** : catégorie, date de début et date de fin."
    - text: "Vous pouvez répondre **étape par étape**, ou tout envoyer en une seule phrase."

  utter_ask_categorie_voiture:
    - text: "Quel type de véhicule recherchez-vous ?"
      buttons:
        - title: "🚗 Économique"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'
        - title: "🚙 Citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
        - title: "🚘 SUV / Familiale"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'

  utter_ask_date_debut:
    - text: "À quelle date souhaitez-vous **récupérer** le véhicule ?"
    - text: "Exemples : **15 juillet**, **15/07/2026** ou **demain**."

  utter_ask_date_fin:
    - text: "Jusqu'à quelle date en aurez-vous besoin ?"
    - text: "Exemples : **22 juillet** ou **22/07/2026**."

  utter_slot_categorie_invalide:
    - text: "Je n'ai pas reconnu cette catégorie. Choisissez l'une des options ci-dessous :"
      buttons:
        - title: "🚗 Économique"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'
        - title: "🚙 Citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
        - title: "🚘 SUV / Familiale"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'

  utter_slot_date_invalide:
    - text: "Je n'ai pas compris cette date."
    - text: "Essayez par exemple **« 15 juillet »** ou **« 15/07/2026 »**."

  utter_slot_date_passee:
    - text: "La date de début doit être **aujourd'hui ou plus tard**."
    - text: "Pouvez-vous m'indiquer une autre date ?"

  utter_slot_date_fin_invalide:
    - text: "La date de fin doit être **après** la date de début."
    - text: "Pouvez-vous corriger la date de fin ?"

  utter_demander_categorie_pour_prix:
    - text: "Pour estimer le prix, choisissez d'abord une **catégorie** :"
      buttons:
        - title: "🚗 Économique"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'
        - title: "🚙 Citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
        - title: "🚘 SUV / Familiale"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'

  utter_demander_categorie_pour_dispo:
    - text: "Pour vérifier la **disponibilité**, indiquez la catégorie souhaitée :"
      buttons:
        - title: "🚗 Économique"
          payload: '/fournir_infos{"categorie_voiture":"Économique"}'
        - title: "🚙 Citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
        - title: "🚘 SUV / Familiale"
          payload: '/fournir_infos{"categorie_voiture":"SUV / Familiale"}'

  utter_estimation_prix_base:
    - text: "Tarif indicatif pour une **{categorie_voiture}** : environ **{tarif_journalier} DH/jour** (hors haute saison)."
    - text: "Donnez vos **dates** pour obtenir un total exact."
      buttons:
        - title: "📅 Indiquer mes dates"
          payload: "/reserver_voiture"

  utter_estimation_prix_detail:
    - text: |
        💰 **Estimation de location**

        🚗 **{categorie_voiture}**
        📅 Du **{date_debut}** au **{date_fin}**
        ⏳ **{jours} jour(s)** × {tarif_journalier} DH
    - text: "✅ **Total estimé : {total} DH** (assurance de base incluse)."
      buttons:
        - title: "📅 Réserver maintenant"
          payload: "/reserver_voiture"
        - title: "🚗 Autre catégorie"
          payload: "/demander_categories"

  utter_disponibilite_ok:
    - text: "Excellente nouvelle ✅ **{available} véhicule(s)** **{category}** disponibles du **{date_debut}** au **{date_fin}**."
    - text: "Je peux préparer votre réservation dès maintenant."
      buttons:
        - title: "📅 Continuer la réservation"
          payload: "/reserver_voiture"

  utter_disponibilite_limitee:
    - text: "⚠️ Stock limité : seulement **{available}** **{category}** du **{date_debut}** au **{date_fin}**."
    - text: "Je vous conseille de **réserver rapidement**."
      buttons:
        - title: "📅 Réserver maintenant"
          payload: "/reserver_voiture"
        - title: "🚗 Autre catégorie"
          payload: "/demander_categories"

  utter_disponibilite_indisponible:
    - text: "Désolé, aucun **{category}** n'est disponible du **{date_debut}** au **{date_fin}**."
    - text: "Essayons une **autre date** ou une **autre catégorie**."
      buttons:
        - title: "📅 Changer les dates"
          payload: "/reserver_voiture"
        - title: "🚗 Voir les catégories"
          payload: "/demander_categories"

  utter_resume_incomplet:
    - text: "Il me manque encore des infos pour le récapitulatif."
    - text: "Complétons d'abord la **catégorie** et les **dates**."

  utter_resume_reservation:
    - text: |
        📋 **Récapitulatif**

        🚗 **{categorie_voiture}**
        📅 Du **{date_debut}** au **{date_fin}**
        💰 **{prix_estime} DH** (estimation)
    - text: "Souhaitez-vous **confirmer** cette réservation ?"
      buttons:
        - title: "✅ Confirmer"
          payload: "/confirmer"
        - title: "✏️ Modifier"
          payload: "/reserver_voiture"
        - title: "❌ Annuler"
          payload: "/annuler_reservation"

  utter_reservation_confirmee:
    - text: "✅ **Réservation confirmée !**"
    - text: |
        📄 Réf. **{reservation_id}**
        🚗 **{categorie_voiture}**
        📅 Du **{date_debut}** au **{date_fin}**
    - text: "Merci d'avoir choisi **AutoMaroc**. Bon voyage ! 🚗"

  utter_confirmation_recue:
    - text: "C'est noté ✅ Votre demande pour une **{categorie_voiture}** du **{date_debut}** au **{date_fin}** est enregistrée."

  utter_annulation_politique:
    - text: "Voici notre **politique d'annulation** :"
    - text: |
        • **Gratuite** jusqu'à **48 h** avant la prise en charge
        • Acompte converti en **avoir** en cas d'annulation tardive
        • Pas de remboursement **cash** sur place
    - text: "Souhaitez-vous annuler une réservation existante ?"
      buttons:
        - title: "❌ Oui, annuler"
          payload: "/annuler_reservation"
        - title: "↩️ Non, revenir"
          payload: "/demander_aide"

  utter_annulation_confirmee:
    - text: "Votre réservation **{reservation_id}** est **annulée**."
    - text: "L'acompte sera converti en **avoir** pour votre prochaine location."

  utter_annulation_sans_reservation:
    - text: "Je ne trouve pas de réservation active dans cette conversation."
    - text: "Avec un numéro de référence, contactez notre agence au **+212 5XX-XXXXXX**."

  utter_aide_defaut:
    - text: "Je peux vous aider avec les **véhicules**, les **tarifs**, une **réservation** ou une **annulation**."
    - text: "Que souhaitez-vous faire ?"
      buttons:
        - title: "🚗 Véhicules"
          payload: "/demander_categories"
        - title: "💰 Tarifs"
          payload: "/demander_prix"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"
        - title: "❌ Annuler"
          payload: "/annuler_reservation"

  utter_fallback_rephrase:
    - text: "Je n'ai pas bien compris votre demande."
    - text: "Essayez l'une de ces formulations, ou choisissez une option :"
      buttons:
        - title: "🚗 Louer une citadine"
          payload: '/fournir_infos{"categorie_voiture":"Citadine"}'
        - title: "💰 Voir les tarifs"
          payload: "/demander_prix"
        - title: "📅 Réserver un SUV"
          payload: "/reserver_voiture"

  utter_demander_aide:
    - text: "Je suis là pour vous accompagner 😊"
    - text: "Voici ce que je peux faire pour vous :"
      buttons:
        - title: "🚗 Véhicules"
          payload: "/demander_categories"
        - title: "💰 Tarifs"
          payload: "/demander_prix"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"
        - title: "📄 Conditions"
          payload: "/demander_conditions"
        - title: "❌ Annuler"
          payload: "/annuler_reservation"

  utter_iamabot:
    - text: "Je suis l'**assistant AutoMaroc Location**, votre guide pour la location de véhicules au **Maroc**."
    - text: "Comment puis-je vous aider aujourd'hui ?"
      buttons:
        - title: "🚗 Voir les véhicules"
          payload: "/demander_categories"
        - title: "📅 Réserver"
          payload: "/reserver_voiture"

  utter_reservation_annulee_par_utilisateur:
    - text: "Pas de souci, j'annule la procédure en cours."
    - text: "Souhaitez-vous **recommencer** ou poser une autre question ?"
      buttons:
        - title: "📅 Nouvelle réservation"
          payload: "/reserver_voiture"
        - title: "💬 Autre question"
          payload: "/demander_aide"

  utter_reformuler_reservation:
    - text: "D'accord 👍 Indiquez les **nouvelles infos** (catégorie et/ou dates)."
    - text: "Je mets à jour votre demande dès réception."

actions:
  - validate_reservation_form
  - action_check_availability
  - action_estimate_rental_price
  - action_reservation_summary
  - action_confirm_reservation
  - action_confirm_cancellation
  - action_reset_reservation_form
  - action_default_fallback

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true