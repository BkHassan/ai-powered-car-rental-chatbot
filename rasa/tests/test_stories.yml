#### Tests end-to-end pour AutoMaroc Location

stories:
- story: test salutation et catégories
  steps:
  - user: |
      Bonjour
    intent: saluer
  - action: utter_saluer
  - user: |
      Quelles catégories avez-vous ?
    intent: demander_categories
  - action: utter_categories

- story: test réservation happy path
  steps:
  - user: |
      Je veux louer une voiture
    intent: reserver_voiture
  - action: reservation_form
  - active_loop: reservation_form
  - user: |
      Une citadine du 15 juillet au 22 juillet
    intent: fournir_infos
  - active_loop: reservation_form
  - active_loop: null
  - action: action_check_availability
  - action: action_estimate_rental_price
  - action: action_reservation_summary
  - user: |
      Oui je confirme
    intent: confirmer
  - action: action_confirm_reservation

- story: test demande d'aide
  steps:
  - user: |
      Aide
    intent: demander_aide
  - action: utter_demander_aide

- story: test bot challenge
  steps:
  - user: |
      Es-tu un robot ?
    intent: bot_challenge
  - action: utter_iamabot

- story: test conditions et pièces
  steps:
  - user: |
      Quelles sont les conditions ?
    intent: demander_conditions
  - action: utter_conditions
  - user: |
      Quels documents faut-il ?
    intent: demander_pieces
  - action: utter_pieces_requises

- story: test au revoir
  steps:
  - user: |
      Merci, au revoir
    intent: prendre_conge
  - action: utter_prendre_conge
